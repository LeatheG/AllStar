<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found | All-Star Cars</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.12.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css" />
    <style>
      .error-page {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
          url('https://images.unsplash.com/photo-1602751581070-14a4eb37e8d5?auto=format&fit=crop&w=1400&q=80') no-repeat center center/cover;
        background-attachment: fixed;
      }
      .error-content {
        text-align: center;
        color: white;
        padding: 2rem;
        background: rgba(0, 0, 0, 0.6);
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div class="error-page">
      <div class="error-content">
        <h1 class="display-1 mb-4">404</h1>
        <h2 class="display-6 mb-4">Page Not Found</h2>
        <p class="lead mb-4">Oops! The page you're looking for has driven off into the sunset.</p>
        <a href="index.html" class="btn btn-danger btn-lg">
          <i class="bi bi-house-fill me-2"></i>Return Home
        </a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
